<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Code Editor</title>
    <style>
        body {
            background-color: #0e0e0e;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
        }

        .editor-container {
            max-width: 900px;
            margin: auto;
        }

        textarea {
            width: 100%;
            height: 300px;
            background-color: #1e1e1e;
            color: #00ff99;
            font-size: 16px;
            padding: 10px;
            border-radius: 5px;
            border: none;
            resize: vertical;
        }

        select, button {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        select {
            background-color: #1e1e1e;
            color: #00ff99;
            margin-right: 10px;
        }

        button {
            background-color: #00cc66;
            color: white;
            cursor: pointer;
        }

        h2 {
            color: #00cc66;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <h2 th:text="${question}">Question Title</h2>

        <form th:action="@{/submit-code}" method="post">
            <input type="hidden" name="question" th:value="${question}" />
            <input type="hidden" name="category" th:value="${category}" />

            <!-- Optional: language selector -->
            <label for="language">Language:</label>
            <select name="language" id="language">
                <option value="java">Java</option>
                <option value="python3">Python</option>
                <option value="cpp">C++</option>
                <option value="c">C</option>
                <option value="javascript">JavaScript</option>
            </select>

            <!-- Code Editor -->
            <textarea name="code" placeholder="Write your code here..." required
                      th:text="${code}"> </textarea>

            <br>
            <button type="submit">Run Code</button>
        </form>
    </div>
</body>
</html>
