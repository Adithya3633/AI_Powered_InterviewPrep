<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('/user.jpg'); /* Background image for user dashboard */
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        .dashboard-container {
            background-color: rgba(0, 0, 0, 0.75);
            padding: 40px;
            margin: 100px auto;
            width: 60%;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .dashboard-container h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .dashboard-container h3 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .category-list {
            list-style-type: none;
            padding: 0;
        }

        .category-list li {
            margin: 12px 0;
        }

        .category-list a {
            color: #ffcc00;
            font-size: 18px;
            text-decoration: none;
            padding: 10px 20px;
            background-color: #333;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .category-list a:hover {
            background-color: #555;
        }

        .links {
            margin-top: 30px;
        }

        .links a {
            margin: 0 15px;
            color: #00ffff;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Display welcome message with the username -->
        <h2>Welcome, <span th:text="${username}">User</span>!</h2>

        <h3>Select a Category to Begin:</h3>
        <!-- List of categories with updated icons -->
        <ul class="category-list">
            <li><a th:href="@{/questions?category=python}">🐍 Python</a></li>
            <li><a th:href="@{/questions?category=java}">🌐 Java</a></li>
            <li><a th:href="@{/questions?category=c}">💻 C Programming</a></li>
        </ul>

        <div class="links">
            <!-- Link to the user's submissions page -->
            <a th:href="@{/submissions}">📂 My Submissions</a>
            <!-- Link to logout -->
            <a th:href="@{/logout}">🚪 Logout</a>
			
        </div>
    </div>
</body>
</html>
